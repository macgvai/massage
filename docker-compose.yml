services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: massage-app
    restart: unless-stopped
    ports:
      - "3082:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://massage-simferopol.ru}
    volumes:
      - ./db:/app/db
      - ./public/images:/app/public/images
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
